<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students - Administration</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            font-size: 16px;
            background-color: #f1f5f9;
            color: #1e293b;
            margin: 0;
            padding: 30px;
        }

        .admin-wrapper {
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: #0f172a;
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 15px;
            color: #334155;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 8px;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .field-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #64748b;
        }

        select,
        input {
            padding: 10px;
            font-size: 0.95rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background: #fff;
            outline: none;
        }

        select:focus {
            border-color: #2563eb;
        }

        .actions-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-view {
            background: #2563eb;
            color: white;
        }

        .btn-archive {
            background: #059669;
            color: white;
        }

        .btn-update {
            background: #d97706;
            color: white;
        }

        .btn-delete {
            background: #dc2626;
            color: white;
        }

        .status-panel {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 0.95rem;
            display: none;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #f1f5f9;
        }

        th {
            background: #f8fafc;
            color: #64748b;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="admin-wrapper">
        <h1>Management Portal</h1>
        <div id="notice" class="status-panel"></div>

        <section class="card">
            <h2>Search & Controls</h2>
            <div class="input-grid">
                <div class="field-box">
                    <label>Grade Level</label>
                    <select id="grade" onchange="updateSections('grade', 'section')">
                        <option value="">Select Grade</option>
                        <option value="4">Grade 4</option>
                        <option value="5">Grade 5</option>
                        <option value="6">Grade 6</option>
                    </select>
                </div>
                <div class="field-box">
                    <label>Section Name</label>
                    <select id="section">
                        <option value="">Select Grade First</option>
                    </select>
                </div>
            </div>
            <div class="actions-bar">
                <button class="btn-view" onclick="onView()">View List</button>
                <button class="btn-archive" onclick="onArchive()">Archive Class (ZIP)</button>
                <button class="btn-delete" onclick="onDelete()">Delete Class</button>
            </div>
        </section>

        <section class="card">
            <h2>Class Migration (Transfer Students)</h2>
            <div class="input-grid">
                <div class="field-box">
                    <label>Target Grade</label>
                    <select id="newGrade" onchange="updateSections('newGrade', 'newSection')">
                        <option value="">Select Grade</option>
                        <option value="4">Grade 4</option>
                        <option value="5">Grade 5</option>
                        <option value="6">Grade 6</option>
                    </select>
                </div>
                <div class="field-box">
                    <label>Target Section</label>
                    <select id="newSection">
                        <option value="">Select Grade First</option>
                    </select>
                </div>
            </div>
            <button class="btn-update" onclick="onUpdate()">Apply Migration</button>
        </section>

        <section class="card" id="studentDisplay" style="display: none;">
            <h2>Student Roster</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Gender</th>
                    </tr>
                </thead>
                <tbody id="studentRows"></tbody>
            </table>
        </section>
    </div>
    <script src="js/mp_managestudents.js"></script>
</body>

</html>
